# Redis 7 — BankObserve360 local mode
# Single-instance, persistent, no auth (training only).

bind 0.0.0.0
port 6379
protected-mode no

# ── Persistence ─────────────────────────────────────────────────────────────
save 60 1000
appendonly yes
appendfsync everysec
dir /data

# ── Memory ──────────────────────────────────────────────────────────────────
maxmemory 1gb
maxmemory-policy allkeys-lru

# ── Logging ─────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Slow log (for observability labs) ───────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 256

# ── Keyspace notifications (used by velocity-checker for expiry events) ─────
notify-keyspace-events Ex
