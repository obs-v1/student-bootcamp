  alertmanager:
    command:
    - --config.file=/etc/alertmanager/alertmanager.yml
    - --storage.path=/alertmanager
    container_name: bankobs-alertmanager
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O-
      - http://localhost:9093/-/healthy
      timeout: 3s
      interval: 10s
      retries: 5
