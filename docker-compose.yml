  cassandra:
    container_name: bankobs-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: bankobs-payments
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_RACK: rack1
      HEAP_NEWSIZE: 256M
      MAX_HEAP_SIZE: 1G
    healthcheck:
      test:
      - CMD-SHELL
      - nodetool status | grep -E '^UN' || exit 1
      timeout: 10s
      interval: 15s
      retries: 20
      start_period: 1m0s
    image: cassandra:4.1
    mem_limit: '2147483648'
    networks:
      account2-data: null
    ports:
    - mode: ingress
      target: 9042
      published: '9042'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: volume
      source: cassandra-data
      target: /var/lib/cassandra
      volume: {}
    - type: bind
      source: ./infrastructure/databases/cassandra/init-scripts
      target: /docker-entrypoint-initdb.d
      read_only: true
      bind: {}
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
  cassandra-init:
    depends_on:
      cassandra:
        condition: service_healthy
        required: true
    entrypoint:
    - bash
    - -c
    - '

      until cqlsh cassandra -e ''describe keyspaces'' >/dev/null 2>&1; do echo ''waiting''; sleep 5; done;

      for f in /init/*.cql; do echo "running $$f"; cqlsh cassandra -f "$$f"; done;

      echo done

      '
    image: cassandra:4.1
    networks:
      account2-data: null
    restart: 'no'
    volumes:
    - type: bind
      source: ./infrastructure/databases/cassandra/init-scripts
      target: /init
      read_only: true
      bind: {}
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
