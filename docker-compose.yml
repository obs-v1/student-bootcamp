name: bankobserve360
services:
  aadhaar-adapter:
    container_name: bankobs-aadhaar-adapter
    depends_on:
      license-checker:
        condition: service_started
        required: true
    environment:
      CASSANDRA_HOSTS: cassandra:9042
      CASSANDRA_KEYSPACE: bankobs_payments
      DEPLOYMENT_ENV: training
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: bankobs-training-jwt-secret-2024
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: INFO
      MONGODB_URL: mongodb://bankobs:Training123!@mongodb:27017/bankobs?authSource=admin
      OBSERVABILITY_MODE: dark
      ORACLE_PASSWORD: Training123!
      ORACLE_URL: jdbc:oracle:thin:@oracle:1521/XEPDB1
      ORACLE_USER: BANKOBS_CORE
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: aadhaar-adapter
      OTEL_SERVICE_NAMESPACE: banking-identity
      PII_MASKING_MODE: full
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: Training123!
      POSTGRES_USER: bankobs
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      SERVICE_NAME: aadhaar-adapter
      SERVICE_PORT: '8032'
      SERVICE_VERSION: 1.0.0
      OTEL_SDK_DISABLED: 'true'
      MANAGEMENT_TRACING_ENABLED: 'false'
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: 'false'
      LOGGING_LEVEL_IO_OPENTELEMETRY: 'OFF'
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O- http://localhost:8032/health/live || exit 1
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 30s
    mem_limit: '268435456'
    networks:
      account2-app: null
      account2-data: null
    ports:
    - mode: ingress
      target: 8032
      published: '18032'
      protocol: tcp
    restart: unless-stopped
    image: public.ecr.aws/w8x4g9h7/obs-v1/aadhaar-adapter:1.0.0
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '3'
