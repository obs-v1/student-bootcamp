# Elasticsearch 8 — audit + statement search.
# Requires vm.max_map_count >= 262144 on the EC2 HOST (kind shares the
# kernel) — `make prep` sets it.
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: bankobs
  labels: { app: elasticsearch, tier: data }
spec:
  selector: { app: elasticsearch }
  ports:
    - { name: http, port: 9200, targetPort: 9200 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: bankobs
  labels: { app: elasticsearch, tier: data }
spec:
  serviceName: elasticsearch
  replicas: 1
  selector: { matchLabels: { app: elasticsearch } }
  template:
    metadata:
      labels: { app: elasticsearch, tier: data }
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
          ports: [{ containerPort: 9200 }]
          env:
            - { name: discovery.type, value: single-node }
            - { name: cluster.name, value: bankobs-es }
            - { name: xpack.security.enabled, value: "false" }
            - { name: ES_JAVA_OPTS, value: "-Xms1g -Xmx1g" }
          startupProbe:
            exec:
              command:
                - bash
                - -c
                - curl -sf http://localhost:9200/_cluster/health | grep -E '"status":"(green|yellow)"'
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - curl -sf http://localhost:9200/_cluster/health | grep -E '"status":"(green|yellow)"'
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket: { port: 9200 }
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: "1", memory: 1536Mi }
          volumeMounts:
            - { name: data, mountPath: /usr/share/elasticsearch/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources: { requests: { storage: 10Gi } }
