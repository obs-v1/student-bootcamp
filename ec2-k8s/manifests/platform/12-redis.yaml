# Redis — cache + rate limit + OTP + sessions.
# Uses the course redis.conf via the `redis-conf` ConfigMap.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: bankobs
  labels: { app: redis, tier: data }
spec:
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: bankobs
  labels: { app: redis, tier: data }
spec:
  serviceName: redis
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata:
      labels: { app: redis, tier: data }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: [redis-server, /usr/local/etc/redis/redis.conf]
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: [redis-cli, ping] }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: { command: [redis-cli, ping] }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1280Mi }
          volumeMounts:
            - { name: data, mountPath: /data }
            - name: conf
              mountPath: /usr/local/etc/redis/redis.conf
              subPath: redis.conf
              readOnly: true
      volumes:
        - name: conf
          configMap: { name: redis-conf }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources: { requests: { storage: 2Gi } }
