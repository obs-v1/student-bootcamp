# Kafka 3.7 (KRaft, single broker, no ZooKeeper).
# The advertised listener is `kafka:9092` — the Service name — exactly like
# the docker-compose network alias, so clients need no changes.
# Topics are created by the kafka-init Job (50-init-jobs.yaml).
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: bankobs
  labels: { app: kafka, tier: data }
spec:
  selector: { app: kafka }
  ports:
    - { name: broker, port: 9092, targetPort: 9092 }
    - { name: controller, port: 9093, targetPort: 9093 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: bankobs
  labels: { app: kafka, tier: data }
spec:
  serviceName: kafka
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata:
      labels: { app: kafka, tier: data }
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - { containerPort: 9092 }
            - { containerPort: 9093 }
          env:
            - { name: CLUSTER_ID, value: BankObserve360Cluster1A }
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: CONTROLLER }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka:9093" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: PLAINTEXT }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "false" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
          startupProbe:
            exec:
              command:
                - bash
                - -c
                - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            tcpSocket: { port: 9092 }
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources: { requests: { storage: 10Gi } }
