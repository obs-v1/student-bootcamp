# MongoDB — fraud rules, AML cases, audit, loan applications.
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: bankobs
  labels: { app: mongodb, tier: data }
spec:
  selector: { app: mongodb }
  ports:
    - { name: mongo, port: 27017, targetPort: 27017 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: bankobs
  labels: { app: mongodb, tier: data }
spec:
  serviceName: mongodb
  replicas: 1
  selector: { matchLabels: { app: mongodb } }
  template:
    metadata:
      labels: { app: mongodb, tier: data }
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports: [{ containerPort: 27017 }]
          env:
            - { name: MONGO_INITDB_ROOT_USERNAME, value: bankobs }
            - { name: MONGO_INITDB_ROOT_PASSWORD, value: Training123! }
          readinessProbe:
            exec:
              command: [mongosh, --quiet, --eval, "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command: [mongosh, --quiet, --eval, "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          volumeMounts:
            - { name: data, mountPath: /data/db }
            - { name: init, mountPath: /docker-entrypoint-initdb.d, readOnly: true }
      volumes:
        - name: init
          configMap: { name: mongo-init }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: standard
        resources: { requests: { storage: 5Gi } }
