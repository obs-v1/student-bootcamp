# Fluent Bit — log pipeline with the course PII masking (pii-mask.lua).
#
# This is the one component that could NOT be reused verbatim: the compose
# version tails Docker's JSON log files, but kind nodes run containerd, so
# the input here tails the CRI-format files under /var/log/containers/ and
# lifts the nested app JSON out of the `message` field instead of `log`.
# Everything downstream (health-probe drop, JSON lift, PII lua masking,
# label defaults, Loki output with $service/$level labels) matches
# config/fluent-bit/fluent-bit.conf. pii-mask.lua itself is mounted
# unchanged from the `fluent-bit-lua` ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: bankobs
  labels: { app: fluent-bit, tier: observability }
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Parsers_File  /fluent-bit/etc/extra/parsers-cri.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

    # ── Tail bankobs pod logs (containerd / CRI format) ────────────────────
    [INPUT]
        Name              tail
        Path              /var/log/containers/*_bankobs_*.log
        Parser            cri
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        DB                /fluent-bit/state/fb.db

    # ── Drop heartbeats / probes from health endpoints ─────────────────────
    [FILTER]
        Name    grep
        Match   kube.*
        Exclude message /(health/live|health/ready|metrics)$

    # ── Lift the structured JSON our services emit to the top level ────────
    [FILTER]
        Name         parser
        Match        kube.*
        Key_Name     message
        Parser       json
        Reserve_Data On

    # ── PII masking (last line of defence) ─────────────────────────────────
    [FILTER]
        Name   lua
        Match  kube.*
        Script /fluent-bit/etc/extra/pii-mask.lua
        Call   mask_pii

    # ── Default label keys for plain-text lines ────────────────────────────
    [FILTER]
        Name   modify
        Match  kube.*
        Add    service unknown
        Add    level   unknown

    # ── Drop noisy OTel exporter retry errors ──────────────────────────────
    [FILTER]
        Name    grep
        Match   kube.*
        Exclude logger_name ^io\.opentelemetry\.exporter

    # ── Output → Loki ──────────────────────────────────────────────────────
    [OUTPUT]
        Name        loki
        Match       *
        Host        loki
        Port        3100
        Labels      job=fluent-bit, env=training
        Label_Keys  $service,$level
        Auto_Kubernetes_Labels Off
        Line_Format json
  parsers-cri.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<message>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    [PARSER]
        Name        json
        Format      json
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: bankobs
  labels: { app: fluent-bit, tier: observability }
spec:
  selector: { matchLabels: { app: fluent-bit } }
  template:
    metadata:
      labels: { app: fluent-bit, tier: observability }
    spec:
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:2.2.2
          ports: [{ containerPort: 2020 }]
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 2020 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/extra/parsers-cri.conf
              subPath: parsers-cri.conf
              readOnly: true
            - name: lua
              mountPath: /fluent-bit/etc/extra/pii-mask.lua
              subPath: pii-mask.lua
              readOnly: true
            - { name: varlog, mountPath: /var/log, readOnly: true }
            - { name: state, mountPath: /fluent-bit/state }
      volumes:
        - name: config
          configMap: { name: fluent-bit-config }
        - name: lua
          configMap: { name: fluent-bit-lua }
        - name: varlog
          hostPath: { path: /var/log }
        - name: state
          hostPath: { path: /var/lib/fluent-bit-state, type: DirectoryOrCreate }
