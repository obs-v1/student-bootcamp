# Alertmanager — course config from config/alertmanager/alertmanager.yml.
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: bankobs
  labels: { app: alertmanager, tier: observability }
spec:
  selector: { app: alertmanager }
  ports:
    - { name: http, port: 9093, targetPort: 9093 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: bankobs
  labels: { app: alertmanager, tier: observability }
spec:
  replicas: 1
  selector: { matchLabels: { app: alertmanager } }
  template:
    metadata:
      labels: { app: alertmanager, tier: observability }
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports: [{ containerPort: 9093 }]
          readinessProbe:
            httpGet: { path: /-/ready, port: 9093 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: 9093 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 250m, memory: 256Mi }
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
              readOnly: true
            - { name: storage, mountPath: /alertmanager }
      volumes:
        - name: config
          configMap: { name: alertmanager-config }
        - name: storage
          emptyDir: {}
