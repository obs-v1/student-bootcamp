# Jaeger all-in-one (in-memory storage), OTLP receiver enabled — the OTel
# Collector exports traces to jaeger:4317.
# UI exposed on the EC2 host at :16686 via NodePort 31686.
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: bankobs
  labels: { app: jaeger, tier: observability }
spec:
  type: NodePort
  selector: { app: jaeger }
  ports:
    - { name: ui, port: 16686, targetPort: 16686, nodePort: 31686 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
    - { name: collector-http, port: 14268, targetPort: 14268 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: bankobs
  labels: { app: jaeger, tier: observability }
spec:
  replicas: 1
  selector: { matchLabels: { app: jaeger } }
  template:
    metadata:
      labels: { app: jaeger, tier: observability }
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.53
          ports:
            - { containerPort: 16686 }
            - { containerPort: 4317 }
            - { containerPort: 4318 }
            - { containerPort: 14268 }
          env:
            - { name: COLLECTOR_OTLP_ENABLED, value: "true" }
            - { name: SPAN_STORAGE_TYPE, value: memory }
            - { name: MEMORY_MAX_TRACES, value: "100000" }
          readinessProbe:
            httpGet: { path: /, port: 16686 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 16686 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
