# Loki — course config from config/loki/loki-config.yaml.
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: bankobs
  labels: { app: loki, tier: observability }
spec:
  selector: { app: loki }
  ports:
    - { name: http, port: 3100, targetPort: 3100 }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: bankobs
  labels: { app: loki, tier: observability }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources: { requests: { storage: 10Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: bankobs
  labels: { app: loki, tier: observability }
spec:
  replicas: 1
  strategy: { type: Recreate }   # single RWO volume
  selector: { matchLabels: { app: loki } }
  template:
    metadata:
      labels: { app: loki, tier: observability }
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: loki
          image: grafana/loki:2.9.4
          args: [-config.file=/etc/loki/loki-config.yaml]
          ports: [{ containerPort: 3100 }]
          readinessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 768Mi }
          volumeMounts:
            - name: config
              mountPath: /etc/loki/loki-config.yaml
              subPath: loki-config.yaml
              readOnly: true
            - { name: data, mountPath: /loki }
      volumes:
        - name: config
          configMap: { name: loki-config }
        - name: data
          persistentVolumeClaim: { claimName: loki-data }
