# Prometheus — course config + alert rules from config/prometheus/.
# Exposed on the EC2 host at :9090 via NodePort 30990 (see kind-config.yaml).
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: bankobs
  labels: { app: prometheus, tier: observability }
spec:
  type: NodePort
  selector: { app: prometheus }
  ports:
    - { name: http, port: 9090, targetPort: 9090, nodePort: 30990 }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: bankobs
  labels: { app: prometheus, tier: observability }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources: { requests: { storage: 10Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: bankobs
  labels: { app: prometheus, tier: observability }
spec:
  replicas: 1
  strategy: { type: Recreate }   # single RWO volume
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata:
      labels: { app: prometheus, tier: observability }
    spec:
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.49.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=72h
            - --web.enable-remote-write-receiver
            - --web.enable-lifecycle
          ports: [{ containerPort: 9090 }]
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: 9090 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - { name: alerts, mountPath: /etc/prometheus/alerts, readOnly: true }
            - { name: data, mountPath: /prometheus }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: alerts
          configMap: { name: prometheus-alerts }
        - name: data
          persistentVolumeClaim: { claimName: prometheus-data }
