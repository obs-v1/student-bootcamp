# Transit Gateway simulation — routes cross-VPC telemetry.
# Account 2 and 3 OTel Collectors → Account 1 central OTel Collector.

global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

# ── Health check listener ───────────────────────────────────────────────────
listen stats
    bind :8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s

# ── OTLP gRPC: route from account2/3 to account1 central collector ──────────
frontend otel-grpc-in
    bind :4317
    mode tcp
    default_backend otel-central-grpc

backend otel-central-grpc
    mode tcp
    server otel-central otel-collector:4317 check

# ── OTLP HTTP: route from account2/3 to account1 central collector ──────────
frontend otel-http-in
    bind :4318
    mode http
    default_backend otel-central-http

backend otel-central-http
    mode http
    server otel-central otel-collector:4318 check
