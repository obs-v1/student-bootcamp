apiVersion: 1

providers:
  - name: 'BankObserve360 dashboards'
    orgId: 1
    folder: 'BankObserve360'
    folderUid: bankobs
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
