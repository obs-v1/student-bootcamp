[SERVICE]
    Flush         1
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    Health_Check  On

# ── Tail container logs from the Docker socket ──────────────────────────────
[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*-json.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    DB                /fluent-bit/state/fb.db

# ── Drop heartbeats / probes from health endpoints ──────────────────────────
[FILTER]
    Name    grep
    Match   docker.*
    Exclude log /(health/live|health/ready|metrics)$

# ── Parse the nested JSON inside the `log` field ───────────────────────────
# The Docker JSON driver wraps each line as {"log": "<original>", "stream": "stdout"}.
# Our services emit structured JSON, so this lifts fields like service, level,
# trace_id, payment_id, amount, debit_account, credit_account, etc. to the top
# level where Loki can index them as labels and Grafana can query them.
[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       json
    Reserve_Data On

# ── PII masking (last line of defence — application should already mask) ───
[FILTER]
    Name   lua
    Match  docker.*
    Script /fluent-bit/etc/pii-mask.lua
    Call   mask_pii

# ── Drop noisy OTel exporter retry errors (15s churn from many services) ──
[FILTER]
    Name    grep
    Match   docker.*
    Exclude logger_name ^io\.opentelemetry\.exporter

# ── Output → Loki ──────────────────────────────────────────────────────────
# No Tenant_ID — Loki has auth_enabled=false and serves the default tenant.
[OUTPUT]
    Name        loki
    Match       *
    Host        loki
    Port        3100
    Labels      job=fluent-bit, env=training
    Label_Keys  $service,$level
    Auto_Kubernetes_Labels Off
    Line_Format json
