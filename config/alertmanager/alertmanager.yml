global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity', 'domain']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h
  receiver: 'console'
  routes:
    - match: { severity: critical }
      receiver: 'console-critical'
      continue: true
    - match: { domain: security }
      receiver: 'console-security'
      continue: true

receivers:
  - name: 'console'
    webhook_configs:
      - url: 'http://alertmanager:9093/dummy'    # local logging only
        send_resolved: true

  - name: 'console-critical'
    webhook_configs:
      - url: 'http://alertmanager:9093/dummy/critical'
        send_resolved: true

  - name: 'console-security'
    webhook_configs:
      - url: 'http://alertmanager:9093/dummy/security'
        send_resolved: true

inhibit_rules:
  - source_match: { severity: critical }
    target_match: { severity: warning }
    equal: ['alertname', 'instance']
