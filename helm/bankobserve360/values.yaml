# Global defaults for the BankObserve360 umbrella chart.

global:
  registry: ghcr.io/bankobserve360
  imageTag: "1.0.0"
  pullPolicy: IfNotPresent

  observability:
    mode: full              # full | partial | dark
  pii:
    mode: full              # full | pipeline_level | app_level | disabled

  otel:
    endpoint: http://otel-collector.monitoring.svc.cluster.local:4317

# Each sub-chart can be toggled independently.
core-banking:        { enabled: true }
payments:            { enabled: true }
retail-banking:      { enabled: true }
customer-identity:   { enabled: true }
fraud-risk:          { enabled: true }
notifications:       { enabled: true }
audit-compliance:    { enabled: true }
legacy-stack:        { enabled: true }
observability-stack: { enabled: true }
loadrunner:          { enabled: true }
